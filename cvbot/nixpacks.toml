[phases.setup]
nixPkgs = ["nodejs_20", "maven", "jdk17", "chromium"]

[variables]
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = [
    "chmod +x mvnw",
    "./mvnw clean package -DskipTests"
]

[start]
cmd = "java -jar target/cvbot-0.0.1-SNAPSHOT.jar"